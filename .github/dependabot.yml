version: 2
# trigger: refresh Dependabot after pinning docker-compose image tags (2026-07-20)
updates:
- package-ecosystem: maven
  directory: /app
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - maven
  commit-message:
    prefix: chore(deps)
    prefix-development: chore(deps-dev)
    include: scope
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - github-actions
  commit-message:
    prefix: ci(deps)
    include: scope
- package-ecosystem: docker
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - docker
  commit-message:
    prefix: chore(deps)
    prefix-development: chore(deps-dev)
    include: scope
