name: Feature request
description: Suggest an improvement to the demo or docs
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What are you trying to improve or add?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or examples are welcome.
